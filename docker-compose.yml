services:
  mongo:
    image: mongo:6
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db

  server:
    build: ./server
    ports:
      - "5000:5000"
    environment:
      - MONGO_URI=mongodb://mongo:27017/mernapp
    depends_on:               
      - mongo

  client:                     
    build: ./client
    ports:
      - "80:80"
    depends_on:
      - server

volumes:                      
  mongo-data:
